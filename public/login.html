<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CondoManage - Inicio de sesión</title>
    <link rel="stylesheet" href="/login.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="login-card animate-fade-in">
        <div class="brand">
          <div class="brand-mark">CM</div>
          <div>
            <h1>Los Rosales</h1>
            <p>Gestión de condominios y servicios profesionales</p>
          </div>
        </div>

        <form id="loginForm" class="login-form" novalidate>
          <div class="form-group">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Ingresa tu usuario" />
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Ingresa tu contraseña" />
          </div>

          <button type="submit" id="loginButton" class="primary-button">Iniciar sesión</button>
          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
